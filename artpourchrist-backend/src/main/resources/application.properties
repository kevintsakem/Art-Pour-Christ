# Server
server.port=${PORT:3001}
spring.application.name=artpourchrist-backend

# ==============================
# DATABASE (H2 pour le développement local)
# ==============================
spring.datasource.url=jdbc:h2:mem:artpourchrist
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
# OBLIGATOIRE en production : définir JWT_SECRET dans les variables d'environnement
# Le secret doit faire au moins 32 caractères
jwt.secret=${JWT_SECRET:localDevSecretKeyMustBeAtLeast32CharsLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# FILE UPLOAD
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary : set CLOUDINARY_URL env var (cloudinary://api_key:api_secret@cloud_name)

# ==============================
# CORS
# ==============================
# Lister les origines séparées par des virgules
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

# ==============================
# ADMIN PAR DÉFAUT
# ==============================
# OBLIGATOIRE en production : changer ces valeurs via les variables d'environnement
app.admin.email=${ADMIN_EMAIL:admin@artpourchrist.com}
app.admin.password=${ADMIN_PASSWORD:Admin@1234}

# ==============================
# MAIL (SMTP)
# ==============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
# Adresse expéditeur (doit correspondre au compte SMTP en production)
app.contact.from=${MAIL_FROM:noreply@artpourchrist.com}
