services:
  - type: web
    name: artpourchrist-backend
    runtime: java
    rootDir: artpourchrist-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/artpourchrist-backend-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_URL
        sync: false
